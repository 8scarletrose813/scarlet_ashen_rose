<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Coven | Secure Channel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --accent: #8a0000;
        --admin-color: #ff3333;
        --mod-color: #ff8800;
        --bg: #050505;
        --text: #c0c0c0;
        --card-bg: rgba(20, 20, 20, 0.6);
    }
    body {
        margin: 0; background-color: var(--bg);
        background-image: linear-gradient(to bottom, #0a0000, #000000);
        color: var(--text); font-family: 'Montserrat', sans-serif;
        min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    #auth-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 100; display: flex;
        flex-direction: column; justify-content: center; align-items: center;
        transition: opacity 0.5s ease;
    }
    .auth-box {
        width: 320px; text-align: center; border: 1px solid #333;
        padding: 40px; position: relative; background: rgba(10,10,10,0.9);
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .auth-box::before {
        content: ''; position: absolute; top:0; left:0; width:100%; height:2px;
        background: var(--accent); box-shadow: 0 0 15px var(--accent);
    }
    .auth-title {
        font-family: 'Cinzel', serif; color: #fff; font-size: 1.6rem;
        margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase;
    }
    .auth-input {
        width: 100%; background: rgba(255,255,255,0.05); border: none;
        border-bottom: 1px solid #555; padding: 12px; color: #fff;
        margin-bottom: 20px; text-align: center; font-family: 'Montserrat', sans-serif;
        outline: none; box-sizing: border-box;
    }
    .auth-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
    .auth-btn {
        background: transparent; border: 1px solid var(--accent);
        color: var(--accent); padding: 12px 30px; font-family: 'Cinzel', serif;
        cursor: pointer; transition: 0.3s; text-transform: uppercase;
        margin-top: 10px; letter-spacing: 2px;
    }
    .auth-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
    .switch-link {
        margin-top: 20px; font-size: 0.75rem; color: #666;
        cursor: pointer; text-decoration: underline;
    }
    .switch-link:hover { color: #fff; }
    .error-msg { color: red; font-size: 0.8rem; margin-top: 15px; opacity: 0; transition: 0.3s; text-shadow: 0 0 5px red; }
    
    #forum-screen {
        display: none; width: 100%; max-width: 900px; padding: 20px;
        box-sizing: border-box; opacity: 0; transition: opacity 1s ease;
    }
    .top-nav {
        width: 100%; display: flex; justify-content: space-between;
        align-items: center; margin-bottom: 30px; padding-top: 10px;
        border-bottom: 1px solid #222; padding-bottom: 15px;
    }
    
    /* Стили для кнопок навигации */
    .nav-left { display: flex; gap: 20px; align-items: center; }
    .nav-btn { 
        background: none; border: none; color: #666; cursor: pointer; 
        text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; 
        transition: 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    }
    .nav-btn:hover { color: var(--accent); }

    .user-badge { color: #fff; font-family: 'Cinzel', serif; border: 1px solid #333; padding: 5px 15px; font-size: 0.9rem; }
    h1 {
        font-family: 'Cinzel', serif; font-weight: 400; letter-spacing: 6px;
        text-transform: uppercase; color: #fff; text-align: center;
        margin-bottom: 40px; text-shadow: 0 0 20px rgba(138, 0, 0, 0.6); font-size: 2.5rem;
    }
    .post-area {
        background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
        padding: 25px; margin-bottom: 60px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    textarea {
        background: transparent; border: none; width: 100%; color: #fff;
        font-family: 'Montserrat', sans-serif; font-size: 1rem; outline: none;
        resize: vertical; border-bottom: 1px solid #333; padding-bottom: 10px;
        min-height: 100px; box-sizing: border-box;
    }
    textarea:focus { border-color: var(--accent); }
    .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .file-upload { cursor: pointer; color: #888; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 10px;}
    .file-upload:hover { color: #fff; }
    #fileInput { display: none; }
    .submit-btn {
        background: var(--accent); color: #000; border: none;
        padding: 10px 40px; font-weight: 600; cursor: pointer;
        text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; letter-spacing: 1px;
    }
    .submit-btn:hover { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }
    .feed { display: flex; flex-direction: column; gap: 30px; padding-bottom: 50px; }
    .msg {
        border-left: 3px solid #333; padding-left: 25px; animation: slideIn 0.4s ease;
        position: relative; background: linear-gradient(90deg, rgba(20,20,20,0.5) 0%, rgba(0,0,0,0) 100%);
        padding-top: 10px; padding-bottom: 10px;
    }
    .msg:hover { border-color: var(--accent); }
    .msg-header {
        display: flex; justify-content: space-between; margin-bottom: 10px;
        font-size: 0.75rem; color: #666; align-items: center;
    }
    .author-box { display: flex; align-items: center; gap: 10px; }
    .msg-author { color: #eee; font-family: 'Cinzel', serif; font-size: 1rem; cursor: default; }
    .role-tag { font-size: 0.6rem; padding: 2px 6px; border: 1px solid #444; text-transform: uppercase; letter-spacing: 1px; }
    .msg-author.supreme { color: var(--admin-color); text-shadow: 0 0 8px var(--admin-color); font-weight: bold; }
    .role-tag.supreme { border-color: var(--admin-color); color: var(--admin-color); }
    .msg-author.admin { color: var(--mod-color); text-shadow: 0 0 5px var(--mod-color); }
    .role-tag.admin { border-color: var(--mod-color); color: var(--mod-color); }
    .msg-actions { display: flex; gap: 15px; align-items: center; }
    .icon-btn { cursor: pointer; transition: 0.2s; color: #444; font-size: 0.9rem; }
    .icon-btn:hover { color: #fff; }
    .delete-btn:hover { color: red; transform: scale(1.2); }
    .promote-btn { color: #444; font-size: 0.7rem; text-transform: uppercase; border: 1px solid #333; padding: 2px 8px; }
    .promote-btn:hover { color: var(--mod-color); border-color: var(--mod-color); }
    .msg-content { color: #ddd; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; margin-top: 5px;}
    .msg-image { margin-top: 15px; max-width: 100%; max-height: 500px; border: 1px solid #333; display: block; box-shadow: 0 0 10px #000; }
    .msg-file {
        display: inline-block; margin-top: 15px; padding: 12px 25px;
        background: rgba(255,255,255,0.03); border: 1px solid #444;
        color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; text-decoration: none;
    }
    .msg-file:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <div id="loginSection">
            <div class="auth-title">Identify</div>
            <input type="text" id="loginName" class="auth-input" placeholder="Codename">
            <input type="password" id="loginPass" class="auth-input" placeholder="Password">
            <button onclick="performLogin()" class="auth-btn">Access</button>
            <div class="switch-link" onclick="toggleAuth('register')">New Protocol? Create Identity</div>
        </div>

        <div id="registerSection" style="display:none;">
            <div class="auth-title">Initialize</div>
            <input type="text" id="regName" class="auth-input" placeholder="Desired Codename">
            <input type="password" id="regPass" class="auth-input" placeholder="Set Password">
            <button onclick="performRegister()" class="auth-btn">Register</button>
            <div class="switch-link" onclick="toggleAuth('login')">Identity Exists? Login</div>
        </div>
        <div id="authError" class="error-msg">Error</div>
    </div>
</div>

<div id="forum-screen">
    <div class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Main</a>
            <button onclick="logout()" class="nav-btn"><i class="fas fa-power-off"></i> Terminate</button>
        </div>
        
        <div class="user-badge" id="currentUserBadge">Unknown</div>
    </div>
    <h1>The Coven</h1>
    <div class="post-area">
        <textarea id="text" placeholder="Transmit into the abyss..." rows="4"></textarea>
        <div class="controls">
            <label class="file-upload">
                <i class="fas fa-paperclip"></i> <span id="fileName">Attach Data</span>
                <input type="file" id="fileInput">
            </label>
            <button onclick="postMessage()" class="submit-btn">Send</button>
        </div>
    </div>
    <div id="feed" class="feed"></div>
</div>

<script>
    const ROOT_ADMIN = "Rose_Scarlet"; 
    const ROOT_PASS = "281207raa";

    const authScreen = document.getElementById('auth-screen');
    const forumScreen = document.getElementById('forum-screen');
    const authError = document.getElementById('authError');
    let currentUser = null; 
    let userRole = 'user';

    document.addEventListener('DOMContentLoaded', () => {
        const session = localStorage.getItem('coven_session');
        if (session) {
            const userData = JSON.parse(session);
            const db = JSON.parse(localStorage.getItem('coven_users_db')) || {};
            if (db[userData.name]) {
                enterForum(userData.name, db[userData.name].role);
            } else {
                localStorage.removeItem('coven_session');
                showLogin();
            }
        } else {
            showLogin();
        }
    });

    function toggleAuth(mode) {
        document.getElementById('authError').style.opacity = 0;
        if(mode === 'register') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
        } else {
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }
    }

    function showLogin() {
        authScreen.style.display = 'flex';
        authScreen.style.opacity = 1;
        forumScreen.style.display = 'none';
    }

    function performRegister() {
        const name = document.getElementById('regName').value.trim();
        const pass = document.getElementById('regPass').value;
        let db = JSON.parse(localStorage.getItem('coven_users_db')) || {};

        if (name.length < 2 || pass.length < 3) {
            showError("Data too short"); return;
        }

        const nameLower = name.toLowerCase();
        const existingNames = Object.keys(db).map(k => k.toLowerCase());

        if (existingNames.includes(nameLower)) {
            showError("Identity Taken"); return;
        }

        let role = 'user';
        db[name] = { pass: pass, role: role };
        localStorage.setItem('coven_users_db', JSON.stringify(db));
        loginUser(name, role);
    }

    function performLogin() {
        const name = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value;
        let db = JSON.parse(localStorage.getItem('coven_users_db')) || {};

        if (name === ROOT_ADMIN && pass === ROOT_PASS) {
            if (!db[name] || db[name].role !== 'supreme') {
                db[name] = { pass: pass, role: 'supreme' };
                localStorage.setItem('coven_users_db', JSON.stringify(db));
            }
            loginUser(name, 'supreme');
            return;
        }

        if (!db[name]) {
            showError("Identity not found"); return;
        }

        if (db[name].pass === pass) {
            loginUser(name, db[name].role);
        } else {
            showError("Invalid Credentials");
        }
    }

    function loginUser(name, role) {
        localStorage.setItem('coven_session', JSON.stringify({ name: name, role: role }));
        enterForum(name, role);
    }

    function logout() {
        localStorage.removeItem('coven_session');
        location.reload();
    }

    function showError(msg) {
        authError.innerText = msg;
        authError.style.opacity = 1;
        setTimeout(() => authError.style.opacity = 0, 2000);
    }

    function enterForum(name, role) {
        currentUser = name;
        userRole = role;

        const badge = document.getElementById('currentUserBadge');
        badge.innerText = name;
        badge.style.color = "#fff";
        badge.style.borderColor = "#333";

        if (role === 'supreme') {
            badge.innerText += " [SUPREME]";
            badge.style.color = "var(--admin-color)";
            badge.style.borderColor = "var(--admin-color)";
        } else if (role === 'admin') {
            badge.innerText += " [ADMIN]";
            badge.style.color = "var(--mod-color)";
            badge.style.borderColor = "var(--mod-color)";
        }

        authScreen.style.opacity = 0;
        setTimeout(() => {
            authScreen.style.display = 'none';
            forumScreen.style.display = 'block';
            setTimeout(() => forumScreen.style.opacity = 1, 100);
        }, 500);

        loadMessages();
    }

    const feed = document.getElementById('feed');
    let attachedFile = null;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 3500000) { 
                alert("File too heavy."); return;
            }
            document.getElementById('fileName').textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(evt) { 
                attachedFile = {
                    data: evt.target.result,
                    name: file.name,
                    type: file.type
                };
            };
            reader.readAsDataURL(file);
        }
    });

    function postMessage() {
        const text = document.getElementById('text').value;
        if (!text && !attachedFile) return;

        let db = JSON.parse(localStorage.getItem('coven_users_db')) || {};
        const currentRole = db[currentUser] ? db[currentUser].role : 'user';

        const msg = {
            id: Date.now(),
            name: currentUser,
            role: currentRole,
            text: text,
            file: attachedFile,
            date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString().slice(0,5)
        };

        let data = JSON.parse(localStorage.getItem('coven_posts_db')) || [];
        if(data.length > 100) data.shift();
        data.push(msg);
        localStorage.setItem('coven_posts_db', JSON.stringify(data));

        renderMessage(msg);
        
        document.getElementById('text').value = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('fileName').innerHTML = '<i class="fas fa-paperclip"></i> Attach Data';
        attachedFile = null;
    }

    function renderMessage(msg) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.id = 'msg-' + msg.id;

        let mediaHtml = '';
        if (msg.file) {
            if (msg.file.type.startsWith('image/')) {
                mediaHtml = `<img src="${msg.file.data}" class="msg-image">`;
            } else {
                mediaHtml = `<a href="${msg.file.data}" download="${msg.file.name}" class="msg-file"><i class="fas fa-download"></i> Download: ${msg.file.name}</a>`;
            }
        }

        let authorClass = 'msg-author';
        let roleBadge = '';
        if (msg.role === 'supreme') {
            authorClass += ' supreme';
            roleBadge = '<span class="role-tag supreme">ROOT</span>';
        } else if (msg.role === 'admin') {
            authorClass += ' admin';
            roleBadge = '<span class="role-tag admin">ADMIN</span>';
        }

        let actionsHtml = '';
        const canDelete = (msg.name === currentUser) || (userRole === 'supreme') || (userRole === 'admin');
        
        if (canDelete) {
            actionsHtml += `<i class="fas fa-times icon-btn delete-btn" onclick="deleteMessage(${msg.id})"></i>`;
        }

        if (userRole === 'supreme' && msg.name !== currentUser && msg.role !== 'supreme' && msg.role !== 'admin') {
            actionsHtml += `<div class="icon-btn promote-btn" onclick="promoteUser('${msg.name}')">▲ PROMOTE</div>`;
        }

        div.innerHTML = `
            <div class="msg-header">
                <div class="author-box">
                    <span class="${authorClass}">${sanitize(msg.name)}</span>
                    ${roleBadge}
                    <span style="font-size:0.7rem; color:#444;">${msg.date}</span>
                </div>
                <div class="msg-actions">
                    ${actionsHtml}
                </div>
            </div>
            <div class="msg-content">${sanitize(msg.text)}</div>
            ${mediaHtml}
        `;
        feed.prepend(div);
    }

    function loadMessages() {
        feed.innerHTML = '';
        let data = JSON.parse(localStorage.getItem('coven_posts_db')) || [];
        data.forEach(renderMessage);
    }

    function deleteMessage(id) {
        if (userRole !== 'supreme' && userRole !== 'admin') {
            const data = JSON.parse(localStorage.getItem('coven_posts_db')) || [];
            const target = data.find(m => m.id === id);
            if (target && target.name !== currentUser) return;
        }

        if(!confirm("Purge data?")) return;
        
        const el = document.getElementById('msg-' + id);
        if(el) el.remove();

        let data = JSON.parse(localStorage.getItem('coven_posts_db')) || [];
        data = data.filter(m => m.id !== id);
        localStorage.setItem('coven_posts_db', JSON.stringify(data));
    }

    function promoteUser(targetName) {
        if (!confirm(`Grant ADMIN privileges to ${targetName}?`)) return;

        let db = JSON.parse(localStorage.getItem('coven_users_db')) || {};
        if (db[targetName]) {
            db[targetName].role = 'admin';
            localStorage.setItem('coven_users_db', JSON.stringify(db));
            alert(`${targetName} is now an Administrator.`);
            location.reload();
        }
    }

    function sanitize(str) {
        if (!str) return '';
        const temp = document.createElement('div');
        temp.textContent = str;
        return temp.innerHTML;
    }
</script>
</body>
</html>
